name: Verify

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.22.2
          cache: npm
          cache-dependency-path: npm/package-lock.json
      - run: npm ci --prefix npm
      - run: npm --prefix npm run verify
